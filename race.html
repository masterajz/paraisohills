<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Paraiso GoKart Racing | Modern Portrait Sandbox</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600;700;800&family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent-gold: #d4af37;
            --bg-dark: #0a0a0a;
            --track-asphalt: #2a2a2a;
            --grass-green: #0f1f0f;
            --rumble-red: #ef4444;
            --atv-orange: #f97316;
            --sonar-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: 'Outfit', sans-serif; touch-action: none; color: #fff; }

        /* Game Container to enforce portrait ratio on PC */
        #game-container {
            width: 100%;
            height: 100%;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background: var(--bg-dark);
        }
        
        @media (min-width: 600px) {
            #game-container { width: 500px; max-height: 90vh; top: 5vh; border: 2px solid #333; border-radius: 15px;}
        }

        #gameCanvas { display: block; width: 100%; height: 100%; }

        /* Floating UI Panel - Stacked Top Left for Portrait */
        .side-ui { position: absolute; top: 20px; left: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .ui-btn { background: rgba(10, 10, 10, 0.95); border: 2px solid var(--accent-gold); color: var(--accent-gold); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.8); transition: 0.2s; }
        .ui-btn:active { transform: scale(0.9); }
        .ui-btn.orange { border-color: var(--atv-orange); color: var(--atv-orange); }
        .ui-btn.blue { border-color: var(--sonar-blue); color: var(--sonar-blue); }

        /* Speedometer - Portrait Top Right */
        #speedometer { position: absolute; top: 20px; right: 20px; text-align: right; z-index: 1000;}
        #speed-val { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 2px 5px #000; font-family: 'Playfair Display', serif; }
        #speed-unit { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-top:-5px; font-family: 'Outfit';}

        /* On-Screen Controls (Adjusted for Portrait Bottom) */
        #atv-bottom-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 1000; width: 95%; justify-content: center; }
        .atv-ctrl-btn { background: rgba(30, 30, 30, 0.95); border: 2px solid; color: white; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: 0.1s; touch-action: none; -webkit-tap-highlight-color: transparent;}
        .atv-ctrl-btn:active { transform: scale(0.85); }
        .atv-ctrl-btn.round { width: 55px; height: 55px; border-radius: 50%; }
        .atv-ctrl-btn.square { width: 60px; height: 70px; border-radius: 12px; }
        .atv-ctrl-btn.orange { border-color: #f97316; color: #f97316; }
        .atv-ctrl-btn.red { border-color: #ef4444; color: #ef4444; }
        .atv-ctrl-btn.yellow { border-color: #eab308; color: #eab308; }
        .atv-ctrl-btn.green { border-color: #22c55e; color: #22c55e; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; border: 1px solid var(--accent-gold); border-radius: 12px; padding: 25px; width: 90%; max-width: 350px; text-align: center; color: #fff; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.9); font-family: 'Outfit', sans-serif;}
        .close-btn { position: absolute; top: 10px; right: 15px; background: transparent; border: none; color: #aaa; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .btn-game { background: transparent; color: var(--accent-gold); border: 1px solid var(--accent-gold); padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; font-weight: 700; width: 100%; margin-top: 15px; font-family: 'Outfit';}
        .btn-game:active { background: var(--accent-gold); color: #000; }
        
        .chat-container { display: flex; flex-direction: column; height: 300px; }
        .chat-msgs { flex: 1; overflow-y: auto; text-align: left; font-size: 12px; font-family: 'Plus Jakarta Sans'; background: #050505; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333;}
        .chat-input-row { display: flex; gap: 5px; }
        .chat-input-row input { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; font-family: 'Outfit'; outline: none;}
        .chat-input-row button { padding: 10px 15px; background: var(--accent-gold); border: none; font-weight: bold; border-radius: 6px; cursor: pointer;}
        
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="speedometer">
            <div id="speed-val">0</div>
            <div id="speed-unit">KPH</div>
        </div>

        <div class="side-ui">
            <div class="ui-btn" title="Leaderboard" onclick="openModal('trophyModal')">🏆</div>
            <div class="ui-btn orange" title="Garage" onclick="openModal('garageModal')"><span class="material-icons-outlined">format_paint</span></div>
            <div class="ui-btn blue" title="Global Chat" onclick="openModal('chatModal')"><span class="material-icons-outlined">forum</span></div>
        </div>

        <div id="atv-bottom-controls">
            <button class="atv-ctrl-btn round orange" oncontextmenu="event.preventDefault();" onmousedown="inputs.left=true" onmouseup="inputs.left=false" ontouchstart="inputs.left=true" ontouchend="inputs.left=false"><span class="material-icons-outlined">navigate_before</span></button>
            <button class="atv-ctrl-btn round orange" oncontextmenu="event.preventDefault();" onmousedown="inputs.right=true" onmouseup="inputs.right=false" ontouchstart="inputs.right=true" ontouchend="inputs.right=false"><span class="material-icons-outlined">navigate_next</span></button>
            
            <div style="width: 15px;"></div>

            <button class="atv-ctrl-btn square red" oncontextmenu="event.preventDefault();" onmousedown="inputs.brake=true" onmouseup="inputs.brake=false" ontouchstart="inputs.brake=true" ontouchend="inputs.brake=false">BRK</button>
            <button class="atv-ctrl-btn square yellow" oncontextmenu="event.preventDefault();" onmousedown="inputs.reverse=true" onmouseup="inputs.reverse=false" ontouchstart="inputs.reverse=true" ontouchend="inputs.reverse=false">REV</button>
            <button class="atv-ctrl-btn square green" oncontextmenu="event.preventDefault();" onmousedown="inputs.forward=true" onmouseup="inputs.forward=false" ontouchstart="inputs.forward=true" ontouchend="inputs.forward=false">GAS</button>
        </div>
    </div>

    <div id="trophyModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModals()">✕</button>
            <h3 style="color:var(--accent-gold); margin-bottom: 10px; font-family:'Playfair Display'">🏆 Leaderboard</h3>
            <p style="font-size: 12px; color: #aaa;">Testing Phase - Portraits Mode Active.</p>
            <div style="margin-top: 20px; font-size: 2.5rem; color: #fff; font-weight: 900;" id="lbScore">0 XP</div>
        </div>
    </div>

    <div id="garageModal" class="modal">
        <div class="modal-content" style="border-color: var(--atv-orange);">
            <button class="close-btn" onclick="closeModals()">✕</button>
            <h3 style="color:var(--atv-orange); margin-bottom: 15px; font-family:'Playfair Display'">Garage</h3>
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="color:#aaa; font-size: 12px;">Paint Color:</label>
                <input type="color" id="carColor" value="#f97316" style="width:100%; height:45px; background:none; border:2px solid #333; cursor:pointer; border-radius:6px; margin-top:5px;">
            </div>
            <button class="btn-game" style="border-color: var(--atv-orange); color: var(--atv-orange);" onclick="applyGarage()">Apply Paint</button>
        </div>
    </div>

    <div id="chatModal" class="modal">
        <div class="modal-content" style="border-color: var(--sonar-blue);">
            <button class="close-btn" onclick="closeModals()">✕</button>
            <h3 style="color:var(--sonar-blue); margin-bottom: 10px; font-family:'Playfair Display'">Global Chat</h3>
            <div class="chat-container">
                <div class="chat-msgs" id="chatBox"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Message..." onkeypress="if(event.key === 'Enter') sendChat()">
                    <button style="background: var(--sonar-blue); color:#fff;" onclick="sendChat()">></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Modal Logic ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function applyGarage() { 
            myKart.color = document.getElementById('carColor').value; 
            closeModals(); 
        }

        // --- Chat Logic ---
        function sendChat() {
            let input = document.getElementById('chatInput');
            if(input.value.trim() === "") return;
            document.getElementById('chatBox').innerHTML += `<div style="margin-bottom:5px;"><b style="color:var(--accent-gold);">Me:</b> <span style="color:#ddd;">${input.value}</span></div>`;
            input.value = "";
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }

        // Disable Context Menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        // --- Game Setup ---
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = container.offsetWidth;
        let height = canvas.height = container.offsetHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = container.offsetWidth;
            height = canvas.height = container.offsetHeight;
        });

        // --- TRACK DEFINITION V2: Modern Zigzag/Tamiya Style ---
        // We define the whole game world area
        const worldSize = { w: 2000, h: 4000 }; // Very long vertical track

        // Track Outer Boundary
        const trackBounds = { x: 100, y: 100, w: 1800, h: 3800 };
        const roadWidth = 350; // Wide roads for easy multi-cart racing

        // Internal Grass/Walls definitions to carve out the path (The "Hindi Tatagos" boundaries)
        const trackWalls = [
            // Carver 1: Bottom Right Island (Creates first hairpin)
            { x: trackBounds.x + roadWidth, y: worldSize.h - roadWidth - 1100, w: trackBounds.w - roadWidth, h: 1100 },
            // Carver 2: Mid-Left Chicane Entry
            { x: trackBounds.x, y: 1500, w: trackBounds.w - roadWidth - 100, h: roadWidth + 200 },
            // Carver 3: Mid-Right Chicane Exit
            { x: trackBounds.x + roadWidth + 200, y: 1100, w: trackBounds.w - roadWidth - 100, h: roadWidth + 200 },
            // Carver 4: Top Center Island
            { x: trackBounds.x + roadWidth, y: trackBounds.y, w: trackBounds.w - roadWidth*2, h: 1000 }
        ];

        // Rumble Strips (Kerbs) data on corners for aesthetics
        const rumbleStrips = [
            // Hairpin Bottom
            { x: trackWalls[0].x - 10, y: worldSize.h - roadWidth - 1100, w: 20, h: 1100, angle: 0 }, 
            // Chicane Left
            { x: trackWalls[1].x + trackWalls[1].w, y: 1500, w: 20, h: roadWidth+200, angle:0 },
            // Chicane Right
            { x: trackWalls[2].x - 10, y: 1100, w: 20, h: roadWidth+200, angle:0 },
        ];
        
        // Lifelike objects: Tire Barriers
        const tireBarriers = [
            { x: worldSize.w - 150, y: 1400, r: 15 }, { x: worldSize.w - 180, y: 1430, r: 15 }, // Tire pile
            { x: 150, y: 1000, r: 15 }, { x: 180, y: 1030, r: 15 }, // Tire pile
        ];

        function isCollision(x, y, kartWidth, kartHeight) {
            // Check Outer Bounds
            if (x - kartWidth/2 < trackBounds.x || x + kartWidth/2 > trackBounds.x + trackBounds.w ||
                y - kartHeight/2 < trackBounds.y || y + kartHeight/2 > trackBounds.y + trackBounds.h) {
                return true;
            }
            // Check Internal Walls
            for (let wall of trackWalls) {
                if (x + kartWidth/2 > wall.x && x - kartWidth/2 < wall.x + wall.w &&
                    y + kartHeight/2 > wall.y && y - kartHeight/2 < wall.y + wall.h) {
                    return true;
                }
            }
            return false;
        }

        // --- Kart Physics ---
        const inputs = { forward: false, reverse: false, left: false, right: false, brake: false };

        // Keyboard Support for PC testing
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp' || e.key === 'w') inputs.forward = true;
            if(e.key === 'ArrowDown' || e.key === 's') inputs.reverse = true;
            if(e.key === 'ArrowLeft' || e.key === 'a') inputs.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') inputs.right = true;
            if(e.key === ' ') inputs.brake = true;
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowUp' || e.key === 'w') inputs.forward = false;
            if(e.key === 'ArrowDown' || e.key === 's') inputs.reverse = false;
            if(e.key === 'ArrowLeft' || e.key === 'a') inputs.left = false;
            if(e.key === 'ArrowRight' || e.key === 'd') inputs.right = false;
            if(e.key === ' ') inputs.brake = false;
        });

        // Player Data
        const myUserId = "PortraitUser_" + Math.floor(Math.random() * 1000);
        let myKart = {
            x: 300, y:worldSize.h - 400, // Start Bottom Left lane
            angle: 0, 
            speed: 0,
            maxSpeed: 16, // Slightly faster on longer track
            accel: 0.3, friction: 0.08, turnSpeed: 0.07,
            width: 25, height: 45,
            color: '#f97316'
        };

        let otherPlayers = {};

        // --- Firebase Multiplayer Sync ---
        let lastSendTime = 0;
        function syncMultiplayer() {
            database.ref('gokart_portrait/' + myUserId).onDisconnect().remove();
            
            // Listen for others once, data updates in gameloop
            database.ref('gokart_portrait').on('value', snapshot => {
                const data = snapshot.val();
                if(!data) return;
                let activeNow = Date.now();
                for (let id in data) {
                    if (id === myUserId) continue;
                    if (activeNow - data[id].lastSeen > 5000) continue; 
                    if (!otherPlayers[id]) {
                        otherPlayers[id] = { ...data[id], renderX: data[id].x, renderY: data[id].y, renderAngle: data[id].angle };
                    } else {
                        otherPlayers[id].x = data[id].x; otherPlayers[id].y = data[id].y; otherPlayers[id].angle = data[id].angle; otherPlayers[id].color = data[id].color;
                    }
                }
            });
        }
        syncMultiplayer();

        // --- Drawing Functions with Modern Styling ---
        function drawPatternedRect(patternCtx, x, y, w, h, color1, color2, size = 10) {
            patternCtx.save();
            patternCtx.beginPath();
            patternCtx.rect(x, y, w, h);
            patternCtx.clip();
            for (let i = 0; i < w + size; i += size) {
                for (let j = 0; j < h + size; j += size) {
                    patternCtx.fillStyle = (Math.floor(i/size) + Math.floor(j/size)) % 2 === 0 ? color1 : color2;
                    patternCtx.fillRect(x + i, y + j, size, size);
                }
            }
            patternCtx.restore();
        }

        function drawBackground(camX, camY) {
            // 1. Fill Grass Background
            ctx.fillStyle = varColor('--grass-green');
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(-camX, -camY);

            // 2. Draw Main Road (Carved Path)
            ctx.fillStyle = varColor('--track-asphalt');
            ctx.fillRect(trackBounds.x, trackBounds.y, trackBounds.w, trackBounds.h);

            // Carve Grass Islands back
            ctx.fillStyle = varColor('--grass-green');
            trackWalls.forEach(wall => ctx.fillRect(wall.x, wall.y, wall.w, wall.h));

            // 3. Draw Rumble Strips (Kerbs) with Pattern
            rumbleStrips.forEach(kerb => {
                drawPatternedRect(ctx, kerb.x, kerb.y, kerb.w, kerb.h, '#fff', varColor('--rumble-red'), 15);
            });
            
            // 4. Draw Lifelike Objects: Tire Barriers
            ctx.fillStyle = '#000'; ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            tireBarriers.forEach(tire => {
                ctx.beginPath(); ctx.arc(tire.x, tire.y, tire.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(tire.x, tire.y, tire.r/2, 0, Math.PI*2); ctx.stroke(); // Inner ring
            });

            // 5. Finish Line Checked
            drawPatternedRect(ctx, trackBounds.x, worldSize.h - 500, roadWidth, 30, '#fff', '#000', 10);

            ctx.restore();
        }

        function drawKart(kart, camX, camY, isMe) {
            ctx.save();
            ctx.translate(kart.x - camX, kart.y - camY);
            ctx.rotate(kart.angle);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(-kart.width/2 + 3, -kart.height/2 + 3, kart.width, kart.height);

            // Draw 4 Wheels
            ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
            const wh = 14; const ww = 7;
            const frontWheelAngle = isMe && (inputs.left ? -0.3 : inputs.right ? 0.3 : 0);
            
            // Back Wheels (Fixed)
            ctx.fillRect(-kart.width/2 - 4, kart.height/2 - wh - 3, ww, wh); // BL
            ctx.fillRect(kart.width/2 - ww + 4, kart.height/2 - wh - 3, ww, wh); // BR
            
            // Front Wheels (Turning effect)
            ctx.save(); ctx.translate(-kart.width/2, -kart.height/2 + 8); ctx.rotate(frontWheelAngle); ctx.fillRect(-4, -wh/2, ww, wh); ctx.restore(); // FL
            ctx.save(); ctx.translate(kart.width/2, -kart.height/2 + 8); ctx.rotate(frontWheelAngle); ctx.fillRect(-ww+4, -wh/2, ww, wh); ctx.restore(); // FR

            // Draw Kart Chassis Body (Gradient)
            let grad = ctx.createLinearGradient(0, -kart.height/2, 0, kart.height/2);
            grad.addColorStop(0, kart.color); grad.addColorStop(1, adjustColor(kart.color, -50));
            ctx.fillStyle = grad;
            ctx.fillRect(-kart.width/2, -kart.height/2, kart.width, kart.height);
            
            // Seat & Engine details
            ctx.fillStyle = '#222'; ctx.fillRect(-6, 0, 12, 10);
            
            // Driver Head (Helmeted modern look)
            ctx.fillStyle = isMe ? '#fff' : '#aaa'; 
            ctx.beginPath(); ctx.arc(0, -2, 9, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#111'; ctx.fillRect(-6, -6, 12, 4); // Visor

            ctx.restore();
        }

        // Helper: Get CSS variable color
        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
        // Helper: Darken/Lighten Color
        function adjustColor(col, amt) {
            let usePound = false; if (col[0] == "#") { col = col.slice(1); usePound = true; }
            let num = parseInt(col,16);
            let r = (num >> 16) + amt; if (r > 255) r = 255; else if (r < 0) r = 0;
            let b = ((num >> 8) & 0x00FF) + amt; if (b > 255) b = 255; else if (b < 0) b = 0;
            let g = (num & 0x0000FF) + amt; if (g > 255) g = 255; else if (g < 0) g = 0;
            return (usePound?"#":"") + (g | (b << 8) | (r << 16)).toString(16);
        }

        // --- Main Game Loop ---
        function gameLoop() {
            // 1. Calculate Physics
            if (inputs.forward) {
                myKart.speed += myKart.accel;
                if(myKart.speed > myKart.maxSpeed) myKart.speed = myKart.maxSpeed;
            } else if (inputs.reverse) {
                myKart.speed -= myKart.accel;
                if(myKart.speed < -myKart.maxSpeed / 2) myKart.speed = -myKart.maxSpeed / 2;
            } else {
                if (myKart.speed > 0) { myKart.speed -= myKart.friction; if(myKart.speed < 0) myKart.speed = 0; }
                if (myKart.speed < 0) { myKart.speed += myKart.friction; if(myKart.speed > 0) myKart.speed = 0; }
            }

            if (inputs.brake) { myKart.speed *= 0.85; if(Math.abs(myKart.speed) < 0.5) myKart.speed = 0; }

            // Steering (only if moving)
            if (Math.abs(myKart.speed) > 0.1) {
                let turnDir = myKart.speed > 0 ? 1 : -1;
                // Harder friction when turning at high speeds
                let driftFactor = inputs.forward && Math.abs(myKart.speed) > myKart.maxSpeed*0.7 ? 1.5 : 1; 
                if (inputs.left) myKart.angle -= (myKart.turnSpeed * turnDir * driftFactor);
                if (inputs.right) myKart.angle += (myKart.turnSpeed * turnDir * driftFactor);
            }

            let nextX = myKart.x + Math.sin(myKart.angle) * myKart.speed;
            let nextY = myKart.y - Math.cos(myKart.angle) * myKart.speed;

            // 2. Collision Detection ("Hindi Tatagos")
            if (isCollision(nextX, nextY, myKart.width, myKart.height)) {
                // Bounce back effect
                myKart.speed = -myKart.speed * 0.4;
                myKart.x -= Math.sin(myKart.angle) * 3;
                myKart.y += Math.cos(myKart.angle) * 3;
            } else {
                myKart.x = nextX;
                myKart.y = nextY;
            }

            // Update UI
            document.getElementById('speed-val').innerText = Math.abs(Math.floor(myKart.speed * 5));

            // 3. Camera (Follow player, landscape view rotated conceptually)
            // Camera centers player in portrait frame
            let camX = myKart.x - width / 2;
            let camY = myKart.y - height / 2;

            // 4. Draw
            ctx.clearRect(0, 0, width, height);
            drawBackground(camX, camY);

            // Interpolate and Draw Others
            for (let id in otherPlayers) {
                let p = otherPlayers[id];
                p.renderX += (p.x - p.renderX) * 0.15;
                p.renderY += (p.y - p.renderY) * 0.15;
                let angleDiff = p.angle - p.renderAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                p.renderAngle += angleDiff * 0.15;
                drawKart({ x: p.renderX, y: p.renderY, angle: p.renderAngle, width: 25, height: 45, color: p.color }, camX, camY, false);
            }

            // Draw Me
            drawKart(myKart, camX, camY, true);
            
            // Send Multiplayer update (Optimized 100ms)
            let now = Date.now();
            if (now - lastSendTime > 100) {
                database.ref('gokart_portrait/' + myUserId).set({
                    x: myKart.x, y: myKart.y, angle: myKart.angle, color: myKart.color, lastSeen: now
                });
                lastSendTime = now;
            }

            requestAnimationFrame(gameLoop);
        }

        // Start Loop
        gameLoop();
    </script>
</body>
</html>
