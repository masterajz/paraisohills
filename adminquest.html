<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paraiso Quest | Mobile Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
      // Ang iyong Firebase Config
      const firebaseConfig = {
        apiKey: "AIzaSyAR5NKaiNwVpLuQm9OqKCOpJG7Ju_Y_6sM",
        authDomain: "quest-e4e9f.firebaseapp.com",
        databaseURL: "https://quest-e4e9f-default-rtdb.firebaseio.com/",
        projectId: "quest-e4e9f",
        storageBucket: "quest-e4e9f.firebasestorage.app",
        messagingSenderId: "397171901653",
        appId: "1:397171901653:web:429d408ca5475e0beb8e5c"
      };
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();
    </script>

    <style>
        :root { 
            --accent-gold: #eab308; /* Mas bright na gold para umangat sa dark background */
            --bg-dark: #0b0f19; /* Deep luxury slate/obsidian black */
            --bg-card: #131a2a; /* Lighter dark blue-grey para sa cards */
            --border-line: #272d3b; /* Subtle modern border */
            --text-main: #f3f4f6; /* Soft white para hindi masakit sa mata */
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: radial-gradient(circle at top, #111827, var(--bg-dark)); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif; 
            padding: 15px; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-line); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--accent-gold); letter-spacing: 1px; font-size: 1.8rem; display: flex; align-items: center; gap: 8px; text-shadow: 0 0 10px rgba(234, 179, 8, 0.2);}
        .header p { font-size: 0.85rem; color: var(--text-muted); }

        /* Grid Layouts */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-line); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.6); 
            backdrop-filter: blur(10px);
        }
        .card h2 { color: var(--accent-gold); font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* Stats Row */
        .stats-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { 
            flex: 1; 
            background: linear-gradient(145deg, #1e293b, var(--bg-card)); 
            border: 1px solid var(--border-line); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
        }
        .stat-box h3 { font-size: 2.5rem; color: var(--text-main); margin-bottom: 5px; font-weight: 700; text-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        .stat-box p { font-size: 0.75rem; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }

        /* Table */
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 500px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-line); font-size: 0.9rem; }
        th { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .btn-kick { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Outfit'; transition: 0.3s; font-size: 0.8rem; box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);}
        .btn-kick:hover { background: #dc2626; transform: translateY(-2px); }

        /* Chat Viewer */
        .chat-container { height: 300px; overflow-y: auto; background: #0f1115; border: 1px solid var(--border-line); border-radius: 8px; padding: 15px; margin-bottom: 15px; font-size: 0.9rem; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);}
        .chat-msg { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #1f2937; }
        .btn-clear { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-family: 'Outfit'; text-transform: uppercase; transition: 0.3s; }
        .btn-clear:hover { background: var(--accent-gold); color: #000; box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }

        /* Maintenance Toggle */
        .switch-container { display: flex; align-items: center; justify-content: space-between; background: #0f1115; padding: 20px; border-radius: 8px; border: 1px solid var(--border-line); }
        .switch { position: relative; display: inline-block; width: 60px; height: 32px; flex-shrink: 0;}
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #374151; transition: .4s; border-radius: 34px; border: 1px solid #4b5563;}
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: #9ca3af; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ef4444; border-color: #ef4444;}
        input:checked + .slider:before { transform: translateX(28px); background-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.8);}

        /* Custom Scrollbar para sa mga panel */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; gap: 5px; }
            .header h1 { justify-content: center; font-size: 1.8rem; }
            
            .stats-row { flex-direction: column; gap: 15px; }
            .dashboard-grid { grid-template-columns: 1fr; }
            
            .card { padding: 15px; }
            .switch-container { flex-direction: column; text-align: center; gap: 15px; }
            
            th, td { padding: 10px 8px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><span class="material-icons-outlined">admin_panel_settings</span> PARAISO ADMIN</h1>
        <p>Resort Gamification Control Center</p>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <h3 id="onlineCount">0</h3>
            <p>Active Players</p>
        </div>
        <div class="stat-box">
            <h3 id="chatCount">0</h3>
            <p>Chat Messages</p>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h2><span class="material-icons-outlined">people</span> Live Players</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Avatar</th>
                            <th>Alias</th>
                            <th>Status</th>
                            <th>XP</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="playerTableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            
            <div class="card">
                <h2><span class="material-icons-outlined">build</span> Game Status</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px; line-height: 1.5;">Turn on Maintenance Mode to lock out players instantly.</p>
                <div class="switch-container">
                    <span id="maintenanceLabel" style="font-weight: bold; color: #22c55e; font-size: 1.1rem; letter-spacing: 1px;">GAME IS LIVE</span>
                    <label class="switch">
                        <input type="checkbox" id="maintenanceToggle" onchange="toggleMaintenance()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <h2><span class="material-icons-outlined">forum</span> Global Chat Monitor</h2>
                <div class="chat-container" id="adminChatBox">
                    </div>
                <button class="btn-clear" onclick="clearAllChats()">Clear All Chats</button>
            </div>
        </div>
    </div>

    <script>
        // 1. MONITOR PLAYERS
        database.ref('players').on('value', (snapshot) => {
            const players = snapshot.val();
            const tableBody = document.getElementById('playerTableBody');
            tableBody.innerHTML = "";
            let count = 0;

            if (players) {
                for (let id in players) {
                    const p = players[id];
                    // Skip offline players (5 mins)
                    if (Date.now() - p.lastSeen > 300000) continue;
                    
                    count++;
                    tableBody.innerHTML += `
                        <tr>
                            <td><img src="${p.avatar}" style="width:32px; height:32px; border-radius:50%; border:2px solid var(--accent-gold); background:#1f2937;"></td>
                            <td style="font-weight:bold; color:var(--text-main); letter-spacing: 1px;">${p.name}</td>
                            <td style="color:var(--text-muted); font-size:0.75rem;">${p.status || 'Playing'}</td>
                            <td style="color:var(--accent-gold); font-weight:900;">${p.score || 0}</td>
                            <td><button class="btn-kick" onclick="kickPlayer('${id}', '${p.name}')">KICK</button></td>
                        </tr>
                    `;
                }
            }
            document.getElementById('onlineCount').innerText = count;
        });

        // 2. KICK PLAYER
        function kickPlayer(uid, name) {
            if(confirm(`Are you sure you want to kick ${name}? This will delete their session.`)) {
                database.ref('players/' + uid).remove();
            }
        }

        // 3. MONITOR CHATS
        database.ref('chats').on('value', (snapshot) => {
            const chats = snapshot.val();
            const chatBox = document.getElementById('adminChatBox');
            chatBox.innerHTML = "";
            let count = 0;

            if(chats) {
                for(let id in chats) {
                    count++;
                    const c = chats[id];
                    const time = new Date(c.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    chatBox.innerHTML += `
                        <div class="chat-msg">
                            <span style="font-size:0.7rem; color:#6b7280;">[${time}]</span> 
                            <b style="color:var(--accent-gold);">${c.sender}:</b> 
                            <span style="color:var(--text-main);">${c.msg}</span>
                            <button onclick="deleteSingleChat('${id}')" style="float:right; background:none; border:none; color:#ef4444; cursor:pointer; font-weight:bold; padding:2px 8px; font-size: 1rem;" title="Delete message">×</button>
                        </div>
                    `;
                }
            }
            document.getElementById('chatCount').innerText = count;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function deleteSingleChat(chatId) {
            if(confirm("Delete this message?")) database.ref('chats/' + chatId).remove();
        }

        function clearAllChats() {
            if(confirm("WARNING: This will delete ALL chat history globally. Proceed?")) {
                database.ref('chats').remove();
            }
        }

        // 4. MAINTENANCE SWITCH LOGIC
        const toggleBtn = document.getElementById('maintenanceToggle');
        const label = document.getElementById('maintenanceLabel');

        database.ref('settings/maintenance').on('value', (snapshot) => {
            const isMaintenance = snapshot.val();
            toggleBtn.checked = isMaintenance;
            if(isMaintenance) {
                label.innerText = "UNDER MAINTENANCE";
                label.style.color = "#ef4444";
            } else {
                label.innerText = "GAME IS LIVE";
                label.style.color = "#22c55e";
            }
        });

        function toggleMaintenance() {
            const state = toggleBtn.checked;
            if(state) {
                if(confirm("Are you sure? This will lock out all players from the game immediately.")) {
                    database.ref('settings/maintenance').set(true);
                } else {
                    toggleBtn.checked = false; // Revert if cancelled
                }
            } else {
                database.ref('settings/maintenance').set(false);
            }
        }
    </script>
</body>
</html>
